app = "gacha-matchmaker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SOLANA_RPC = "https://rpc.shyft.to?api_key=vK9_JUsPkMTJY6fE"
  # Separate endpoint for getTokenAccountsByDelegate — Shyft blocks this method
  POOL_DISCOVERY_RPC = "https://mainnet.helius-rpc.com/?api-key=174bd3e2-d17b-492f-902b-710feb5d18bc"

# Set secrets via: fly secrets set MATCHMAKER_KEYPAIR=... JUP_API_KEY=... GACHA_PROGRAM_ID=...

[[services]]
  internal_port = 3000
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
