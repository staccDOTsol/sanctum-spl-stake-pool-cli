app = "gacha-matchmaker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SOLANA_RPC = "https://rpc.shyft.to?api_key=vK9_JUsPkMTJY6fE"
  # POOL_DISCOVERY_RPC is a Fly SECRET (unrestricted Helius key, server-side only —
  # domain allowlists can't cover origin-less server requests). Set via:
  #   fly secrets set POOL_DISCOVERY_RPC="https://mainnet.helius-rpc.com/?api-key=…"
  # Public RPC handed to the browser dApp (domain-locked Helius key, safe to expose)
  FRONTEND_RPC = "https://mainnet.helius-rpc.com/?api-key=174bd3e2-d17b-492f-902b-710feb5d18bc"
  # Gacha mechanics
  MIN_ROLL_FEE_SOL = "0.003"
  MAX_ROLLS_PER_PAYMENT = "10"   # one payment of N× the fee buys N swaps (10-pull)
  GACHA_PITY_HARD = "90"         # consecutive losing rolls before the up-only guarantee
  GACHA_PITY_SOFT = "74"
  VALUE_BAND = "5" # roll-for-roll: match counterparties within 5× the rolled bag's USD value (anti-drain, but loose enough for liquidity)
  # Ledgers persist on the mounted volume so the jackpot pot + dividend ledger
  # + swap history survive deploys/restarts.
  SWAP_HISTORY_PATH = "/data/swap-history.json"
  DIVIDEND_LEDGER_PATH = "/data/dividend-ledger.json"
  JACKPOT_PATH = "/data/jackpot.json"

# Set secrets via: fly secrets set MATCHMAKER_KEYPAIR=... JUP_API_KEY=... GACHA_PROGRAM_ID=...

# Stateful singleton crank — exactly one machine watches the payment account.
[mounts]
  source = "gacha_data"
  destination = "/data"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
